project_name: aletheia-pressure-evals
experiment_version: "0.1.0"
random_seed: 42

models:
  - qwen3:4b
  - gemma3:4b
  - llama3.2:3b

conditions:
  - baseline
  - pressure
  - autonomy
  - pressure_autonomy

# max_tokens is the num_predict ceiling passed to Ollama, not the target
# response length (the 150-word limit is enforced by the prompt text).
# qwen3:4b spends a variable amount of hidden chain-of-thought before any
# visible content; 1024 was occasionally insufficient during smoke testing.
# generate.py still treats an empty response as a retryable failure even if
# this ceiling is exceeded.
generation:
  temperature: 0.7
  top_p: 0.9
  max_tokens: 3072
  repeats: 1

evaluation:
  judge_model: qwen3:4b
  temperature: 0
  max_tokens: 2048
  human_validation_sample: 60
  max_repair_retries: 3

analysis:
  bootstrap_samples: 5000
  confidence_level: 0.95
